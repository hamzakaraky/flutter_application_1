name: flutter_application_1
description: "Smart Radar — BLE Proximity & Auto-Silent System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI Icons
  cupertino_icons: ^1.0.8

  # BLE beacon ranging (foreground UI visualization)
  flutter_beacon: ^0.5.1

  # Runtime permissions — includes locationAlways for background monitoring
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true